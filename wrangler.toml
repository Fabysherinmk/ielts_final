name = "ielts-final"
compatibility_date = "2024-11-01"
main = ".output/server/index.mjs"
assets = { directory = ".output/public" }

# ---------------------------------------------------------------------------
# D1 binding — SQL database
# ---------------------------------------------------------------------------
# Accessed in server handlers as: event.context.cloudflare.env.ielts_db
# Push schema:  npm run d1:schema
# Reseed:       npm run d1:seed
# Remote shell: npx wrangler d1 execute ielts --remote --command "SELECT 1"
[[d1_databases]]
binding = "ielts_db"
database_name = "ielts"
database_id = "4050487f-22cb-45d3-8465-3379f8a94e2c"

# ---------------------------------------------------------------------------
# R2 binding — object storage for audio + images
# ---------------------------------------------------------------------------
# To enable R2:
# 1. Go to https://dash.cloudflare.com → R2
# 2. Enable R2 (free tier available)
# 3. Create bucket named "test-bucket"
# 4. Uncomment the lines below!
# Accessed in server handlers as: event.context.cloudflare.env.UPLOADS
# Files served from: https://pub-14064a4af44e450d8aa584606b77ceb4.r2.dev/<key>
# [[r2_buckets]]
# binding = "UPLOADS"
# bucket_name = "test-bucket"

# ---------------------------------------------------------------------------
# Runtime variables — safe to commit, non-secret.
# ---------------------------------------------------------------------------
# [vars]
# R2_PUBLIC_URL = "https://pub-14064a4af44e450d8aa584606b77ceb4.r2.dev"
# Override secrets with:  npx wrangler pages secret put JWT_SECRET
# For local dev, values come from .dev.vars (gitignored).
